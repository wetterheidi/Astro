server {
    listen 80;
    server_name astro.wetterheidi.de;

    root /apps/astro;
    index Astro_v2.html;

    auth_basic "Wetterheidi Tools";
    auth_basic_user_file /etc/nginx/.htpasswd-wetterheidi;

    location / {
        try_files $uri $uri/ =404;
    }

    # Caching für statische Assets
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Kein Caching für HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
